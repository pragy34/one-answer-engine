services:
  - type: web
    name: one-answer-engine
    runtime: python
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
